global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "default"
      repeat_interval: 1h

receivers:
  - name: "default"
    # Configure a real receiver here, e.g.:
    # slack_configs:
